apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: streaming-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 341796273562.dkr.ecr.us-east-1.amazonaws.com/streaming-frontend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80