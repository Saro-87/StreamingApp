apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth
  namespace: streaming-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
      - name: auth

        image: 341796273562.dkr.ecr.us-east-1.amazonaws.com/streaming-auth:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: PORT
          value: "3001"

        - name: MONGO_URI
          value: "mongodb://mongo:27017/streamingapp"

        - name: JWT_SECRET
          value: "changeme"

        - name: CLIENT_URLS
          value: "http://localhost:3000"

        - name: AWS_ACCESS_KEY_ID
          value: ""

        - name: AWS_SECRET_ACCESS_KEY
          value: ""

        - name: AWS_REGION
          value: "ap-south-1"

        - name: AWS_S3_BUCKET
          value: ""